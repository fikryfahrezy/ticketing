pre-commit:
  parallel: true
  jobs:
    - run: npx prettier --write {staged_files}
      root: "back-end/"
      glob:
        - "*.md"
        - "*.json"
        - "*.yaml"
      stage_fixed: true

    - run: npx eslint {staged_files} && npx prettier --write {staged_files}
      root: "back-end/"
      glob:
        - "*.html"
        - "*.css"
        - "*.tsx"
        - "*.jsx"
      stage_fixed: true