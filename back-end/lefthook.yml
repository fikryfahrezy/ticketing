pre-commit:
  parallel: true
  jobs:
    - root: "back-end/"
      stage_fixed: true
      glob:
        - "*.md"
        - "*.json"
        - "*.yaml"
      run: bun run prettier --write {staged_files}

    - root: "back-end/"
      glob:
        - "*.html"
        - "*.css"
        - "*.ts"
        - "*.js"
      group:
        piped: true
        jobs:
          - run: bun run eslint {staged_files}
          - run: bun run prettier --write {staged_files}
            stage_fixed: true
