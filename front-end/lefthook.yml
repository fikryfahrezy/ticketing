pre-commit:
  parallel: true
  jobs:
    - root: "front-end/"
      stage_fixed: true
      glob:
        - "*.md"
        - "*.json"
        - "*.yaml"
      run: npm exec prettier --write {staged_files}

    - root: "front-end/"
      stage_fixed: true
      glob:
        - "*.html"
        - "*.css"
        - "*.tsx"
        - "*.jsx"
      group:
        piped: true
        jobs:
          - run: npx eslint {staged_files}
          - run: npx prettier --write {staged_files}